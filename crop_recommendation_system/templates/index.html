
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Crop Recommendation System</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
background: radial-gradient(circle at top,#1b2735,#090a0f);
display:flex;
justify-content:center;
align-items:center;
color:white;
}

/* subtle animated glow background */

body::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:
radial-gradient(circle at 20% 30%,rgba(0,255,150,0.15),transparent 40%),
radial-gradient(circle at 80% 70%,rgba(0,200,120,0.15),transparent 40%);
z-index:-1;
}

.container{
width:420px;
background:rgba(20,20,20,0.85);
padding:35px;
border-radius:16px;
backdrop-filter:blur(12px);
box-shadow:0 10px 40px rgba(0,0,0,0.6);
border:1px solid rgba(255,255,255,0.08);
}

h2{
text-align:center;
margin-bottom:25px;
color:#00e676;
}

label{
font-size:14px;
font-weight:500;
color:#ccc;
}

input{
width:100%;
padding:10px;
margin-top:6px;
margin-bottom:15px;
border-radius:8px;
border:1px solid #333;
background:#111;
color:white;
font-size:14px;
transition:0.3s;
}

input:focus{
border-color:#00e676;
outline:none;
box-shadow:0 0 8px rgba(0,230,118,0.4);
}

button{
width:100%;
padding:12px;
border:none;
background:linear-gradient(45deg,#00c853,#00e676);
color:#001b0c;
font-size:16px;
font-weight:600;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 15px rgba(0,255,150,0.6);
}

.footer{
text-align:center;
margin-top:15px;
font-size:13px;
color:#aaa;
}

</style>

</head>

<body>

<div class="container">

<h2>🌱 Crop Recommendation</h2>

<form action="/predict" method="post">

<label>Nitrogen</label>
<input type="number" name="N" required>

<label>Phosphorous</label>
<input type="number" name="P" required>

<label>Potassium</label>
<input type="number" name="K" required>

<label>Temperature (°C)</label>
<input type="number" step="any" name="temperature" required>

<label>Humidity (%)</label>
<input type="number" step="any" name="humidity" required>

<label>pH Level</label>
<input type="number" step="any" name="ph" required>

<label>Rainfall (mm)</label>
<input type="number" step="any" name="rainfall" required>

<button type="submit">Predict Crop 🌾</button>

</form>

</div>

</body>
</html>
