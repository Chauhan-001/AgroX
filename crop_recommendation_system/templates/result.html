<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Crop Recommendation Result</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            color: #fff;
            height: 100vh;
            overflow: hidden;
            background:
                linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                url('https://upload.wikimedia.org/wikipedia/commons/8/8d/Indian_Farmland_Aerial_View.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background-color: rgba(0, 0, 0, 0.7);
            max-width: 500px;
            padding: 40px 30px;
            text-align: center;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.4);
            animation: popin 0.8s ease-out;
        }

        @keyframes popin {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        h2 {
            font-size: 28px;
            margin-bottom: 20px;
        }

        p {
            font-size: 26px;
            color: #00ffcc;
            font-weight: bold;
        }

        a {
            display: inline-block;
            margin-top: 30px;
            text-decoration: none;
            padding: 12px 25px;
            background-color: #28a745;
            color: white;
            font-size: 16px;
            border-radius: 8px;
            transition: background 0.3s ease;
        }

        a:hover {
            background-color: #1e7e34;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>✅ Recommended Crop is </h2>
        <p>🌱 <strong>{{ crop }}</strong> 🌱</p>
        <a href="/">🔙 Back to Home Page</a>
    </div>
</body>
</html>
