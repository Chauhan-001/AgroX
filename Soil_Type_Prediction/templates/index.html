<!DOCTYPE html>
<html>
<head>
<title>Soil Prediction</title>

<meta name="color-scheme" content="light">

<style>

body{
    font-family: Arial;
    background: #e8f5e9;
    text-align: center;
}

.container{
    background: white;
    width: 400px;
    margin: auto;
    padding: 30px;
    margin-top: 50px;
    border-radius: 10px;
    box-shadow: 0px 0px 10px gray;
}

input{
    width: 90%;
    padding: 10px;
    margin: 8px;
    background-color: #ffffff;
    color: #000000;
    border: 1px solid #ccc;
}

/* CUSTOM DROPDOWN */
.dropdown{
    position: relative;
    width: 90%;
    margin: auto;
}

.dropdown-btn{
    width: 100%;
    padding: 10px;
    border: 1px solid #ccc;
    background: white;
    cursor: pointer;
    text-align: left;
}

.dropdown-content{
    display: none;
    position: absolute;
    width: 100%;
    background: white;
    border: 1px solid #ccc;
    z-index: 1;
}

.dropdown-content div{
    padding: 10px;
    cursor: pointer;
}

.dropdown-content div:hover{
    background: #f1f1f1;
}

button{
    background: green;
    color: white;
    padding: 10px 20px;
    border: none;
    font-size: 16px;
    cursor: pointer;
    margin-top: 10px;
}

</style>
</head>
<body>
<div class="container">
<h1>Soil Type Prediction</h1>
<form action="/predict" method="post">

<input type="number" step="any" name="ph" placeholder="pH Value" required>
<input type="number" step="any" name="moisture" placeholder="Moisture" required>
<input type="number" step="any" name="nitrogen" placeholder="Nitrogen" required>
<input type="number" step="any" name="phosphorus" placeholder="Phosphorus" required>
<input type="number" step="any" name="potassium" placeholder="Potassium" required>
<input type="number" step="any" name="carbon" placeholder="Organic Carbon" required>

<!-- CUSTOM DROPDOWN -->
<div class="dropdown">
    <div class="dropdown-btn" onclick="toggleDropdown()">Select Texture</div>
    <div class="dropdown-content" id="dropdownContent">
        <div onclick="selectOption('Sandy')">Sandy</div>
        <div onclick="selectOption('Clay')">Clay</div>
        <div onclick="selectOption('Loamy')">Loamy</div>
        <div onclick="selectOption('Silty')">Silty</div>
        <div onclick="selectOption('Peaty')">Peaty</div>
    </div>
</div>

<!-- Hidden input to send value to Flask -->
<input type="hidden" name="texture" id="texture" required>
<input type="number" step="any" name="temp" placeholder="Temperature" required>
<input type="number" step="any" name="rainfall" placeholder="Rainfall" required>

<button type="submit">Predict Soil</button>
</form>
</div>
<script>

function toggleDropdown(){
    document.getElementById("dropdownContent").style.display =
        document.getElementById("dropdownContent").style.display === "block" ? "none" : "block";
}

function selectOption(value){
    document.querySelector(".dropdown-btn").innerText = value;
    document.getElementById("texture").value = value;
    document.getElementById("dropdownContent").style.display = "none";
}

</script>

</body>
</html>
